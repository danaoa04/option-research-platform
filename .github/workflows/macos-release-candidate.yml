name: macOS release candidate

on:
  workflow_dispatch:
    inputs:
      sign_and_notarize:
        description: Use configured Apple secrets to sign and notarize
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Check out the requested source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt
          pip install -r requirements-sidecar.lock
          cd frontend
          npm ci
          npx playwright install chromium

      - name: Run release and quality policy
        run: |
          make quality
          make version-check
          make release-audit
          make release-check
          make docs-check
          make examples-check
          make onboarding-check

      - name: Build clean release candidate
        run: make rc-build

      - name: Execute release validation
        run: |
          make final-e2e
          make RELEASE_PROFILE=release-candidate final-desktop-smoke
          make RELEASE_PROFILE=release-candidate clean-install-test
          make upgrade-test
          make RELEASE_PROFILE=release-candidate reinstall-test
          make recovery-test

      - name: Import Developer ID certificate
        if: ${{ inputs.sign_and_notarize }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TEMP_KEYCHAIN_PASSWORD: ${{ secrets.TEMP_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$TEMP_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$TEMP_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$TEMP_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign release candidate
        if: ${{ inputs.sign_and_notarize }}
        run: make sign-rc

      - name: Configure notarization API key
        if: ${{ inputs.sign_and_notarize }}
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Notarize and staple
        if: ${{ inputs.sign_and_notarize }}
        run: make notarize-rc

      - name: Finalize checksums and evidence
        run: make release-finalize

      - name: Upload draft release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: option-research-platform-1.0.0-rc.1-macos-arm64
          path: release-artifacts/final-rc/
          if-no-files-found: error
          retention-days: 14
